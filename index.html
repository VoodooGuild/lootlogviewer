<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Log Viewer</title>

<link rel="icon" href="logo.png" type="image/png"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:        #09090b;
  --bg1:       #0f1014;
  --bg2:       #141418;
  --bg3:       #1a1a20;
  --bg4:       #222228;
  --bg5:       #2a2a32;
  --line:      rgba(255,255,255,.07);
  --line2:     rgba(255,255,255,.12);
  --line3:     rgba(255,255,255,.18);
  --blue:      #3b82f6;
  --blue-dim:  rgba(59,130,246,.15);
  --blue-bdr:  rgba(59,130,246,.35);
  --amber:     #f59e0b;
  --amber-dim: rgba(245,158,11,.12);
  --amber-bdr: rgba(245,158,11,.3);
  --red:       #ef4444;
  --red-dim:   rgba(239,68,68,.12);
  --red-bdr:   rgba(239,68,68,.3);
  --green:     #22c55e;
  --green-dim: rgba(34,197,94,.1);
  --green-bdr: rgba(34,197,94,.25);
  --purple:    #a855f7;
  --slate:     #64748b;
  --t:         #e4e4e7;
  --t2:        #a1a1aa;
  --t3:        #52525b;
  --t4:        #3f3f46;
  --r:  10px; --r2: 7px; --r3: 5px;
  --fn: 'Geist', system-ui, -apple-system, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body { background: var(--bg); color: var(--t); font-family: var(--fn); line-height: 1.55; min-height: 100vh; display: flex; flex-direction: column; -webkit-font-smoothing: antialiased; }

header { position: sticky; top: 0; z-index: 200; height: 60px; background: rgba(9,9,11,.8); backdrop-filter: blur(16px) saturate(180%); border-bottom: 1px solid var(--line); display: flex; align-items: center; padding: 0 24px; gap: 12px; }
.logo { display: flex; align-items: center; gap: 10px; }
.logo-sq { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; }
.logo-sq img { display: block; width: 100%; height: 100%; object-fit: cover; }
.logo-name { font-size: .95rem; font-weight: 600; color: var(--t); letter-spacing: -.01em; }
.logo-name span { color: var(--t3); font-weight: 400; }
header .divider { width: 1px; height: 20px; background: var(--line2); margin: 0 6px; }
.guild-chip { font-size: .8rem; color: var(--t2); background: var(--bg3); border: 1px solid var(--line); border-radius: 6px; padding: 4px 10px; display: none; align-items: center; gap: 6px; }
.guild-chip.show { display: flex; }
.guild-chip-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--blue); }
.session-chip { font-size: .75rem; color: var(--amber); background: var(--amber-dim); border: 1px solid var(--amber-bdr); border-radius: 6px; padding: 4px 12px; display: none; align-items: center; gap: 6px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
.session-chip.show { display: flex; }

.hright { margin-left: auto; }
.btn-sm { font-family: var(--fn); font-size: .85rem; font-weight: 500; padding: 6px 14px; border-radius: var(--r3); border: 1px solid var(--line2); background: var(--bg3); color: var(--t2); cursor: pointer; transition: all .15s; display: inline-flex; align-items: center; gap: 6px; }
.btn-sm:hover { background: var(--bg4); color: var(--t); border-color: var(--line3); }

#page-upload { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; padding: 30px 20px; gap: 24px; }
.up-hero { text-align: center; }
.up-logo-large { width: 160px; max-width: 50vw; height: auto; margin: 0 auto 16px auto; display: block; filter: drop-shadow(0 8px 24px rgba(0,0,0,0.5)); }
.up-hero h1 { font-size: 2.4rem; font-weight: 800; letter-spacing: 0.05em; color: var(--t); line-height: 1.1; margin-bottom: 4px; text-transform: uppercase; }
.up-hero h2 { font-size: 0.85rem; font-weight: 600; color: var(--t3); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 16px; }
.up-hero p.up-desc { font-size: 0.95rem; color: var(--t2); max-width: 480px; margin: 0 auto; }

.upload-cols { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; width: 100%; max-width: 760px; }
.upload-col { display: flex; flex-direction: column; gap: 8px; flex: 1; min-width: 260px; }
.col-label { font-size: .8rem; font-weight: 600; color: var(--t3); text-transform: uppercase; letter-spacing: .1em; display: flex; align-items: center; gap: 8px; }
.col-badge { background: var(--bg4); border: 1px solid var(--line); border-radius: 4px; padding: 2px 8px; font-size: .75rem; color: var(--t3); font-weight: 400; text-transform: none; letter-spacing: 0; }
.drop-zone { border: 1px dashed var(--line2); border-radius: var(--r); background: var(--bg1); padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 10px; cursor: pointer; transition: all .18s; text-align: center; min-height: 90px; justify-content: center; }
.drop-zone:hover, .drop-zone.over { border-color: var(--blue-bdr); background: var(--blue-dim); }
.drop-zone-icon { font-size: 1.6rem; line-height: 1; }
.drop-zone-text { font-size: .85rem; color: var(--t3); }
.drop-zone-text b { color: var(--blue); font-weight: 600; }
.file-list { display: flex; flex-direction: column; gap: 6px; max-height: 130px; overflow-y: auto; padding-right: 5px; }
.file-pill { display: flex; align-items: center; gap: 10px; background: var(--bg2); border: 1px solid var(--line); border-radius: var(--r3); padding: 8px 12px; font-size: .85rem; }
.fp-remove { width: 20px; height: 20px; border-radius: 4px; flex-shrink: 0; background: none; border: none; color: var(--t3); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: .9rem; transition: all .1s; }
.fp-remove:hover { background: var(--red-dim); color: var(--red); }
.go-btn { font-family: var(--fn); font-size: 1rem; font-weight: 600; padding: 12px 32px; border-radius: var(--r); cursor: pointer; transition: all .15s; border: 1px solid var(--blue-bdr); background: var(--blue-dim); color: var(--blue); width: 100%; max-width: 760px; letter-spacing: -.01em; }
.go-btn:hover:not(:disabled) { background: rgba(59,130,246,.22); border-color: var(--blue); }
.go-btn:disabled { opacity: .3; cursor: not-allowed; }
input[type=file] { display: none; }

#page-app { display: none; flex: 1; }
.stats { display: grid; grid-template-columns: repeat(6, 1fr); border-bottom: 1px solid var(--line); background: var(--bg1); }
@media(max-width:900px){ .stats { grid-template-columns: repeat(3,1fr); } }
.stt { padding: 16px 20px; border-right: 1px solid var(--line); display: flex; flex-direction: column; gap: 4px; }
.stt:last-child { border-right: none; }
.stt-label { font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: .1em; color: var(--t3); display: flex; align-items: center; gap: 6px; }
.stt-val { font-size: 1.8rem; font-weight: 700; letter-spacing: -.03em; line-height: 1; color: var(--t); }
.stt-sub { font-size: .75rem; color: var(--t4); }
.cv-blue  { color: var(--blue);  } .cv-amber { color: var(--amber); } .cv-red   { color: var(--red);   } .cv-slate { color: var(--slate); }

.controls { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; padding: 12px 20px; background: var(--bg1); border-bottom: 1px solid var(--line); position: sticky; top: 60px; z-index: 100; }
.search { display: flex; align-items: center; gap: 8px; background: var(--bg2); border: 1px solid var(--line); border-radius: var(--r2); padding: 8px 12px; flex: 1; min-width: 180px; max-width: 260px; transition: border-color .15s; }
.search:focus-within { border-color: var(--blue-bdr); }
.search input { background: none; border: none; outline: none; color: var(--t); font-family: var(--fn); font-size: .95rem; width: 100%; }
.search input::placeholder { color: var(--t3); }
.seg { display: flex; background: var(--bg2); border: 1px solid var(--line); border-radius: var(--r2); padding: 3px; gap: 2px; }
.seg-btn { font-family: var(--fn); font-size: .85rem; font-weight: 500; padding: 5px 14px; border-radius: 5px; border: none; background: none; color: var(--t3); cursor: pointer; transition: all .12s; white-space: nowrap; }
.seg-btn.on-pending { background: var(--amber-dim); color: var(--amber); border: 1px solid var(--amber-bdr); }
.cdiv { width: 1px; height: 24px; background: var(--line); flex-shrink: 0; align-self: center; }
.ctl-lbl { font-size: .75rem; font-weight: 600; color: var(--t3); text-transform: uppercase; letter-spacing: .1em; white-space: nowrap; }
select { font-family: var(--fn); font-size: .9rem; font-weight: 500; background: var(--bg2); border: 1px solid var(--line); border-radius: var(--r2); color: var(--t2); padding: 6px 12px; cursor: pointer; transition: border-color .15s; min-width: 140px; }

.htoggles { display: flex; gap: 6px; flex-wrap: wrap; }
.htog { font-family: var(--fn); font-size: .82rem; font-weight: 500; padding: 5px 12px; border-radius: 20px; border: 1px solid var(--line); background: var(--bg2); color: var(--t3); cursor: pointer; transition: all .12s; display: flex; align-items: center; gap: 5px; white-space: nowrap; line-height: 1.3; }
.htog.on[data-t="food"] { background: rgba(245,158,11,.1); border-color: rgba(245,158,11,.3); color: var(--amber); }
.htog.on[data-t="potion"] { background: rgba(59,130,246,.1); border-color: rgba(59,130,246,.3); color: var(--blue); }
.htog.on[data-t="mount"] { background: rgba(34,197,94,.08); border-color: rgba(34,197,94,.25); color: var(--green); }
.htog.on[data-t="trash"] { background: rgba(168,85,247,.1); border-color: rgba(168,85,247,.3); color: var(--purple); }
.htog.on[data-t="other"] { background: rgba(100,116,139,.1); border-color: rgba(100,116,139,.3); color: var(--slate); }
.htog.on[data-t="untradable"] { background: rgba(239,68,68,.1); border-color: rgba(239,68,68,.3); color: var(--red); }

#cards-view { padding: 16px 20px; }
.cards-col { display: flex; flex-direction: column; align-items: center; gap: 12px; max-width: 760px; margin: 0 auto; }
.pcard { width: 100%; background: var(--bg1); border: 1px solid var(--line); border-radius: var(--r); transition: border-color .15s; overflow: visible; animation: rise .16s ease both; }
.pcard.s-pending { border-top: 2px solid var(--amber); }
.pcard.s-deposited { border-top: 2px solid var(--blue); }

.ch { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--line); background: var(--bg2); border-radius: var(--r) var(--r) 0 0; }
.avatar { width: 44px; height: 44px; border-radius: 8px; flex-shrink: 0; background: var(--bg4); border: 1px solid var(--line2); display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: 700; color: var(--blue); text-transform: uppercase; }
.ci { flex: 1; min-width: 0; }
.ci-name { font-size: 1.05rem; font-weight: 600; color: var(--t); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: -.01em; }
.ci-guild { font-size: .8rem; color: var(--t3); margin-top: 2px; }
.cr { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
.bd-deposited { background: var(--blue-dim); color: var(--blue); border: 1px solid var(--blue-bdr); }
.bd-pending { background: var(--amber-dim); color: var(--amber); border: 1px solid var(--amber-bdr); }
.cr-count { font-size: .75rem; color: var(--t4); }
.cr-silver { font-size: .75rem; color: var(--amber); font-weight: 600; }

.citems { padding: 14px 16px; display: flex; flex-wrap: wrap; gap: 8px; }
.chip { position: relative; width: 64px; height: 64px; border-radius: var(--r2); background: var(--bg3); border: 1px solid var(--line); overflow: visible; flex-shrink: 0; transition: transform .12s, border-color .12s; cursor: default; }
.chip img { width: 64px; height: 64px; object-fit: cover; border-radius: calc(var(--r2) - 1px); display: block; }
.chip-qty { position: absolute; bottom: 3px; right: 3px; background: rgba(15, 16, 20, 0.9); color: #fff; font-size: 0.75rem; font-weight: 700; padding: 1px 5px; border-radius: 4px; border: 1px solid var(--line2); z-index: 5; pointer-events: none; line-height: 1.1; }

#global-tip { display: none; position: fixed; z-index: 99999; background: var(--bg3); border: 1px solid var(--line2); border-radius: var(--r); padding: 12px 14px; width: 230px; box-shadow: 0 12px 40px rgba(0,0,0,.8); pointer-events: none; font-family: var(--fn); }
.tip-name { font-size: .95rem; font-weight: 600; color: var(--t); margin-bottom: 4px; line-height: 1.35; }
.tip-id { font-size: .7rem; color: var(--t3); font-family: monospace; margin-bottom: 8px; }
.tip-row { display: flex; justify-content: space-between; font-size: .85rem; color: var(--t2); padding: 2px 0; gap: 8px; }
.tip-st { margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--line); font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }

.cf { padding: 12px 16px; border-top: 1px solid var(--line); display: flex; align-items: center; gap: 12px; background: var(--bg2); border-radius: 0 0 var(--r) var(--r); }
.prog { flex: 1; height: 4px; background: var(--bg5); border-radius: 2px; overflow: hidden; }
.prog-fill { height: 4px; border-radius: 2px; background: var(--blue); transition: width .35s ease; }

.webhook-bar{ background:var(--bg1);border-bottom:1px solid var(--line); padding:10px 20px;display:flex;flex-wrap:wrap;gap:10px;align-items:center; }
.btn-discord{ font-family:var(--fn);font-size:.9rem;font-weight:700; padding:6px 16px;border-radius:var(--r2);cursor:pointer;transition:all .15s; border:1px solid rgba(88,101,242,.4);background:rgba(88,101,242,.12);color:#7289da; display:inline-flex;align-items:center;gap:6px;white-space:nowrap; }
.card-send-btn{ font-family:var(--fn);font-size:.8rem;font-weight:700; padding:4px 12px;border-radius:5px;cursor:pointer;transition:all .15s; border:1px solid rgba(88,101,242,.35);background:rgba(88,101,242,.1);color:#7289da; display:inline-flex;align-items:center;gap:4px; }
.wh-status{font-size:.85rem;padding:5px 12px;border-radius:5px;font-weight:600;display:none}

.site-footer { margin-top: auto; text-align: center; padding: 30px 20px; color: var(--t3); font-size: 0.85rem; letter-spacing: 0.02em; }
</style>
</head>
<body>

<header id="main-header" style="display: none;">
  <div class="logo">
    <div class="logo-sq"><img src="logo.png" alt="Logo"></div>
    <span class="logo-name">Log Viewer <span>/ AO</span></span>
  </div>
  <div class="divider"></div>
  <div class="guild-chip" id="guild-chip"><span class="guild-chip-dot"></span><span id="guild-chip-name"></span></div>
  <div class="session-chip" id="session-chip"><span>⏱️</span><span id="session-chip-text"></span></div>
  <div class="hright">
    <button class="btn-sm" id="btn-reload" style="display:none">New upload</button>
  </div>
</header>

<div id="page-upload">
  <div class="up-hero">
    <img src="logo.png" alt="Log Viewer Logo" class="up-logo-large">
    <h1>LOG VIEWER</h1>
    <h2>CREATED BY CHAKZ</h2>
    <p class="up-desc">Upload loot logs and chest logs — combine multiple files.</p>
  </div>
  <div class="upload-cols">
    <div class="upload-col">
      <div class="col-label">📋 Loot Logs</div>
      <div class="drop-zone" id="dz-loot"><div class="drop-zone-text">Click or drag files</div></div>
      <div class="file-list" id="fl-loot"></div>
      <input type="file" id="fi-loot" accept=".txt,.csv" multiple/>
    </div>
    <div class="upload-col">
      <div class="col-label">📦 Chest Logs</div>
      <div class="drop-zone" id="dz-chest"><div class="drop-zone-text">Click or drag files</div></div>
      <div class="file-list" id="fl-chest"></div>
      <input type="file" id="fi-chest" accept=".txt,.csv" multiple/>
    </div>
  </div>
  <button class="go-btn" id="btn-go" disabled>START</button>
</div>

<div id="page-app">
  <div class="stats" id="stats"></div>
  <div class="webhook-bar" id="webhook-bar" style="justify-content:flex-end">
    <button class="btn-discord" id="btn-discord-config">⚙ Discord IDs</button>
    <button class="btn-discord" id="btn-send-all">Notify All Pending</button>

  </div>
  <div class="controls">
    <div class="search"><input type="text" id="s-input" placeholder="Search item, player…"/></div>
    <div class="seg" id="status-seg"><button class="seg-btn" data-s="all">All</button><button class="seg-btn on-pending" data-s="pending">Pending</button></div>

    <span class="ctl-lbl">Hide</span>

      <div class="htog on" data-t="food">🍖 Food</div>

      <div class="htog on" data-t="trash">🗑 Trash</div>
      <div class="htog on" data-t="other">🪨 Others</div>
      <div class="htog on" data-t="untradable">🚫 PvE / Untradable</div>
    </div>
  </div>
  <div id="cards-view"><div class="cards-col" id="cards-col"></div></div>
</div>

<footer class="site-footer">Log Viewer &copy; 2026 &middot; Made by Chakz</footer>
<div id="global-tip"></div>

<script>
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fmtT = ts => { try{ const d=new Date(ts); return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }catch{return ts;} };
const imgUrl = id => `https://render.albiononline.com/v1/item/${encodeURIComponent(id)}.png?size=64&quality=2`;
const fmtSilver = v => v >= 1e6 ? (v / 1e6).toFixed(2) + 'm' : v >= 1e3 ? (v / 1e3).toFixed(1) + 'k' : v.toLocaleString();

let allRows=[],filtered=[],ourGuild='',currentSessionTime='';
let sf='pending',sq='',sguild='';
const PRICE_MAP = JSON.parse(sessionStorage.getItem('ao_prices') || '{}'); 
const hideT=new Set(['food','potion','mount','trash','other','untradable']);
const lootFiles=[], chestFiles=[];

function itemType(r){
  const id=(r.item_id||'').toUpperCase(), from=(r.looted_from_name||'');
  if(id.includes('NONTRADABLE') || id.includes('SILVERBAG') || from.startsWith('@')) return 'untradable';
  if(id.includes('_TRASH')) return 'trash';
  if(id.includes('_POTION')) return 'potion';
  if(id.includes('_MOUNT_') || id.includes('_FARM_')) return 'mount';
  if(/_MEAL_|_STEW|_PIE|_OMELETTE/.test(id)) return 'food';
  if(/_ORE|_FIBER|_HIDE|_ROCK|_WOOD|_STONE|_METAL/.test(id)) return 'other';
  return 'gear';
}

function parseLoot(raw){
  const lines = raw.trim().split('\n');
  if(lines.length < 2) return [];
  const hdr = lines[0].split(';').map(h=>h.trim().toLowerCase());
  const iByG=hdr.indexOf('looted_by_guild'), iByN=hdr.indexOf('looted_by_name'), iId=hdr.indexOf('item_id'), iNm=hdr.indexOf('item_name'), iQty=hdr.indexOf('quantity'), iFrG=hdr.indexOf('looted_from_guild'), iFrN=hdr.indexOf('looted_from_name'), iTs=hdr.indexOf('timestamp');
  return lines.slice(1).map(line=>{
    const p = line.split(';'); if(p.length < 8) return null;
    let rid=(p[iId]||'').trim(); if(rid.includes('MOUNT')&&rid.includes('@')) rid=rid.split('@')[0];
    return { timestamp:p[iTs], looted_by_guild:p[iByG], looted_by_name:p[iByN], item_id:rid, item_name:p[iNm], quantity:parseInt(p[iQty])||1, looted_from_guild:p[iFrG], looted_from_name:p[iFrN] };
  }).filter(Boolean);
}

// OTIMIZAÇÃO: Requisições paralelas e cache
async function fetchPricesAsync(rows) {
  const ids = [...new Set(rows.map(r => r.item_id.split('@')[0]))].filter(id => !PRICE_MAP[id]);
  if(ids.length === 0) return;

  const chunks = [];
  for (let i = 0; i < ids.length; i += 100) chunks.push(ids.slice(i, i + 100));

  const requests = chunks.map(chunk => 
    fetch(`https://europe.albion-online-data.com/api/v2/stats/prices/${chunk.join(',')}?locations=Caerleon,Bridgewatch,Martlock,Thetford,FortSterling,Lymhurst`)
    .then(r => r.json())
    .catch(() => [])
  );

  const results = await Promise.all(requests);
  results.flat().forEach(d => {
    if (d.sell_price_min > 0) {
      if (!PRICE_MAP[d.item_id]) PRICE_MAP[d.item_id] = [];
      PRICE_MAP[d.item_id].push(d.sell_price_min);
    }
  });

  Object.keys(PRICE_MAP).forEach(k => {
    if(Array.isArray(PRICE_MAP[k])) {
      PRICE_MAP[k] = Math.round(PRICE_MAP[k].reduce((a,b)=>a+b,0) / PRICE_MAP[k].length);
    }
  });
  sessionStorage.setItem('ao_prices', JSON.stringify(PRICE_MAP));
}

function enrichRows(lootRows, ourGuild, chestRows){
  const pool = {}; (chestRows||[]).forEach(c => { const k=c.item_name+'|'+(c.enc||0); pool[k]=(pool[k]||0)+c.quantity; });
  return lootRows.map(r => {
    if(!ourGuild) return {...r, status:'neutral'};
    if(r.looted_by_guild !== ourGuild) return {...r, status:'neutral'};
    const k=r.item_name+'|'+((r.item_id.match(/@(\d)$/)||[0,0])[1]);
    if(pool[k] >= r.quantity){ pool[k]-=r.quantity; return {...r, status:'deposited'}; }
    return {...r, status:'pending'};
  });
}

function detectSessionTime(rows) {
  const c = {}; rows.forEach(r => { const d=new Date(r.timestamp); if(!isNaN(d)){ const k=`${d.getUTCDate()}/${d.getUTCMonth()+1} - ${d.getUTCHours()}:00`; c[k]=(c[k]||0)+1; } });
  return Object.entries(c).sort((a,b)=>b[1]-a[1])[0]?.[0] || '';
}

function renderStats(){
  let base = allRows.filter(r=>!hideT.has(itemType(r)));
  if(sq){ const q=sq.toLowerCase(); base=base.filter(r=>r.item_name.toLowerCase().includes(q)||r.looted_by_name.toLowerCase().includes(q)); }
  const s = {dep:0, pend:0, val:0};
  base.forEach(r=>{ if(r.status==='deposited') s.dep++; if(r.status==='pending'){ s.pend++; s.val+=(PRICE_MAP[r.item_id.split('@')[0]]||0)*r.quantity; } });
  document.getElementById('stats').innerHTML = `<div class="stt"><div class="stt-label">⚔️ Total</div><div class="stt-val">${base.length}</div></div><div class="stt"><div class="stt-label">🔵 Deposited</div><div class="stt-val cv-blue">${s.dep}</div></div><div class="stt"><div class="stt-label">🟡 Pending</div><div class="stt-val cv-amber">${s.pend}</div></div><div class="stt"><div class="stt-label">💰 Pend. Value</div><div class="stt-val cv-amber">${fmtSilver(s.val)}</div></div><div class="stt"><div class="stt-label">👥 Players</div><div class="stt-val cv-slate">${new Set(base.map(r=>r.looted_by_name)).size}</div></div>`;
}

function applyFilters(){
  renderStats();
  let rows = allRows.filter(r=>!hideT.has(itemType(r)));
  if(sq){ const q=sq.toLowerCase(); rows=rows.filter(r=>r.item_name.toLowerCase().includes(q)||r.looted_by_name.toLowerCase().includes(q)); }
  if(sf==='pending') rows=rows.filter(r=>r.status==='pending');
  filtered=rows; renderCards();
}

function renderCards(){
  const m = {}; filtered.forEach(r => {
    const k=r.looted_by_name; if(!m[k]) m[k]={name:k,items:[],silver:0,status:'neutral'};
    m[k].items.push(r); if(r.status==='pending'){ m[k].silver+=(PRICE_MAP[r.item_id.split('@')[0]]||0)*r.quantity; m[k].status='pending'; }
  });
  const groups = Object.values(m).sort((a,b)=> (a.status==='pending'?-1:1) - (b.status==='pending'?-1:1) || b.items.length - a.items.length);
  document.getElementById('cards-col').innerHTML = groups.map(g => `<div class="pcard s-${g.status}"><div class="ch"><div class="avatar">${g.name[0]}</div><div class="ci"><div class="ci-name">${g.name}</div></div><div class="cr"><span class="badge bd-${g.status}">${g.status}</span><span class="cr-silver">💰 ${fmtSilver(g.silver)}</span></div></div><div class="citems">${g.items.slice(0,20).map(i=>`<div class="chip"><img src="${imgUrl(i.item_id)}"></div>`).join('')}</div></div>`).join('') || '<div class="empty-msg">No results.</div>';
}

document.getElementById('btn-go').onclick = async () => {
  let loot = []; lootFiles.forEach(f => loot = loot.concat(parseLoot(f.text)));
  if(!loot.length) return alert('No data');
  ourGuild = loot[0].looted_by_guild; currentSessionTime = detectSessionTime(loot);
  document.getElementById('session-chip-text').textContent = currentSessionTime + ' UTC';
  document.getElementById('session-chip').classList.add('show');
  document.getElementById('page-upload').style.display='none';
  document.getElementById('main-header').style.display='flex';
  document.getElementById('page-app').style.display='block';
  document.getElementById('btn-reload').style.display='inline-flex';
  allRows = enrichRows(loot, ourGuild, []);
  applyFilters();
  window.scrollTo(0,0);
  await fetchPricesAsync(loot); // Preços carregam em background para não travar
  applyFilters();
};

function addFiles(files, store, id){ files.forEach(f=>{ const r=new FileReader(); r.onload=e=>{ store.push({name:f.name,text:e.target.result}); document.getElementById(id).innerHTML+=`<div class="file-pill">${f.name}</div>`; document.getElementById('btn-go').disabled=false; }; r.readAsText(f); }); }
document.getElementById('dz-loot').onclick=()=>document.getElementById('fi-loot').click();
document.getElementById('fi-loot').onchange=e=>addFiles([...e.target.files],lootFiles,'fl-loot');
document.getElementById('dz-chest').onclick=()=>document.getElementById('fi-chest').click();
document.getElementById('fi-chest').onchange=e=>addFiles([...e.target.files],chestFiles,'fl-chest');
document.getElementById('btn-reload').onclick=()=>location.reload();
document.getElementById('s-input').oninput=e=>{sq=e.target.value;applyFilters();};
document.getElementById('status-seg').onclick=e=>{ const b=e.target.closest('[data-s]'); if(b){ sf=b.dataset.s; document.querySelectorAll('[data-s]').forEach(x=>x.className='seg-btn '+(x===b?'on-pending':'')); applyFilters(); }};
document.querySelectorAll('.htog').forEach(b=>{ b.onclick=()=>{ const t=b.dataset.t; if(hideT.has(t)) hideT.delete(t); else hideT.add(t); b.classList.toggle('on'); applyFilters(); }});
</script>
</body>
